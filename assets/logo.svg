<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#logoGradient)" stroke-width="4"/>
    <path d="M20 30 L30 20 L40 30" fill="none" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="30" cy="38" r="6" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Logo Text -->
  <text x="80" y="50" font-family="Outfit, Arial, sans-serif" font-size="36" font-weight="700" fill="url(#logoGradient)">
    Explainur
